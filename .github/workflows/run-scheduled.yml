# 1. 工作流的名称，会在 GitHub Actions 的页面上显示
name: Daily Python Task

# 2. 触发器：定义工作流何时运行
on:
  # 定时触发器
  schedule:
    # 每天的 01:30 (UTC 时间) 运行
    # 换算成北京时间就是当天的 09:30
    - cron: '30 1 * * *'
  # 手动触发器：允许你在 GitHub 页面上点击按钮手动运行，方便测试
  workflow_dispatch:

# 3. 任务本体
jobs:
  # 任务的 ID
  run-script:
    # 在最新的 Ubuntu 系统上运行
    runs-on: ubuntu-latest

    # 4. 任务执行的每一步
    steps:
      # 步骤 1：拉取代码。这是官方 action，会把你的仓库内容下载到运行环境里
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2：设置 Python 环境。指定你需要的 Python 版本
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 你可以改成 '3.10', '3.12' 等
          cache: 'pip'            # 自动缓存 pip 依赖，加速下次运行

      # 步骤 3：安装依赖。只有存在 requirements.txt 文件时才会执行
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 步骤 4：运行你的 Python 脚本！
      - name: Run Python script
        run: python main.py  # 确保这里的文件名和你的主程序一致
